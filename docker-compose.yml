services:
  web:
    build: .
    ports:
      - '8080:80'
    volumes:
      - ./:/var/www/html
    depends_on:
      - db
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: app_db
      DB_USERNAME: app_user
      DB_PASSWORD: secret
      APP_KEY: base64:CGslA1JN++q2ftigCKNItweFSnUAE1q75TFxqJTo/BQ=
      APP_DEBUG: 'true'
    command: >
      bash -c "
      echo 'Setting folder permissions...' &&
      chown -R www-data:www-data storage bootstrap/cache &&
      chmod -R 775 storage bootstrap/cache &&
      echo 'Waiting for database connection...' &&
      until php -r \"try { new PDO('mysql:host=db;port=3306', 'app_user', 'secret'); exit(0); } catch(Exception \$e) { exit(1); }\"; do
        sleep 1
      done &&
      echo 'Database is ready, running migrations and seeders...' &&
      php artisan migrate --force &&
      php artisan db:seed --force &&
      echo 'Starting Apache server...' &&
      apache2-foreground
      "

  db:
    image: mysql:8.0
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: app_db
      MYSQL_USER: app_user
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
